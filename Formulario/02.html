<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>

    <!-- Formulário de cadastro -->
    <form action="processa.php" method="post">

    <fieldset>
        <legend>Dados Pessoais</legend>
        <label for="nome">Nome :</label>
        <input type="text" minlength="3" id="nome" name="nome" required/>
        <br>
        <label for="sobrenome">Sobrenome:</label>
        <input type="text" minlength="2" id="sobrenome" name="sobrenome" required/>
        <br>
        <label for="data_nascimento">Data de nascimento:</label>
        <input type="date" id="data_nascimento" name="data_nascimento" required />
        <br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required/>
        <br>
        <label for="tel_contato">Telefone de contato:</label>
        <input type="tel" id="tel_contato" name="tel_contato" pattern="[0-9]{2}[0-9]{5}[0-9]{4}" placeholder="DDD + número ex: 12 99999-9999" required/>
    </fieldset>

    <fieldset>
        <legend>Informações adicionais</legend>
        <label for="msg">Informações:</label>
        <textarea id="msg" name="msg" cols="30" rows="4" maxlength="200"></textarea>
    </fieldset>

    <fieldset>
        <button type="submit">Enviar</button>
    </fieldset>

    </form>
</body>
</html>
