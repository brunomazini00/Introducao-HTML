<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <!-- Tabela com cabeçalho e rodapé -->
    <h2>Tabela Aulas </h2>
    <table width="100%" border="1">
    <thead>
        <tr>
            <th>Mês</th>
            <th>horas/Aulas</th>
        </tr> 
    <tbody> 
        <tr>
            <td>Junho</td>
            <td>50</td>
        </tr>
        <tr>
            <td>Julho</td>
            <td>50</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <th>Total</th>
            <th>100</th>
        </tr>
    </tfoot>
    </thead>
    </table>
</body>
</html>
