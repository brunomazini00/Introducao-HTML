<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
</head>

<body>
    <h1>Texto em H1</h1>
    <nav>
        <a href="#">HOME</a>
        <a href="#">SOBRE</a>
        <a href="#">CONTATO</a>
    </nav>
    <p>Este texto é <strong> importante</strong></p>
    <p>Este texto é <em> enfatizado </em></p>
    <P>Este texto é <s> tachado </s>
    <p>
    <p><b>H<sub>2</sub>O</b></p>
    <p><i>Este texto está no formato italic</i></p>
    <p><del>Este texto foi excluido.</del></p>
    <p><ins>Este texto foi inserido.</ins></p>
</body>

</html>
